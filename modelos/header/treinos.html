<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Home</title>
    <link rel="stylesheet" href="treino.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">TechStore</a>
        <a href="treino2.html" class="btn-carrinho" id="cartBtn">
            🛒 Carrinho (<span id="contador">0</span>)
        </a>
    </header>

    <main>
        <h2 class="titulo-secao">Produtos em Destaque</h2>
        
        <div class="produtos-grid">
            <div class="produto-card">
                <div class="produto-img">Camiseta Geek</div>
                <h3 class="produto-nome">Camiseta Estampa CSS</h3>
                <p class="produto-preco">R$ 59,90</p>
                <button class="btn-add" data-nome="Camiseta Estampa CSS" data-preco="59.90">Adicionar</button>
            </div>

            <div class="produto-card">
                <div class="produto-img">Caneca Dev</div>
                <h3 class="produto-nome">Caneca JavaScript</h3>
                <p class="produto-preco">R$ 35,00</p>
                <button class="btn-add" data-nome="Caneca JavaScript" data-preco="35.00">Adicionar</button>
            </div>

            <div class="produto-card">
                <div class="produto-img">Mouse Pad</div>
                <h3 class="produto-nome">Mouse Pad Gamer XL</h3>
                <p class="produto-preco">R$ 79,90</p>
                <button class="btn-add" data-nome="Mouse Pad Gamer XL" data-preco="79.90">Adicionar</button>
            </div>

            <div class="produto-card">
                <div class="produto-img">Teclado</div>
                <h3 class="produto-nome">Teclado Mecânico RGB</h3>
                <p class="produto-preco">R$ 299,00</p>
                <button class="btn-add" data-nome="Teclado Mecânico RGB" data-preco="299.00">Adicionar</button>
            </div>
        </div>
    </main>

    <script src="script-loja.js"></script>
</body>
</html>
